server:
  port: 8082

spring:
  application:
    name: sync-task-backend

  datasource:
    url: jdbc:mysql://192.168.107.2:3306/sync_task_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: rootpassword
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: 192.168.117.2:19092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: sync-task-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.synctask.dto"
    topics:
      task-created: sync-task-created
      task-status: sync-task-status

  security:
    user:
      name: admin
      password: admin

jwt:
  secret: synctask-secret-key-very-long-string-for-jwt-token-generation-and-validation-2024
  expiration: 86400000

logging:
  level:
    com.synctask: DEBUG
    org.springframework.security: DEBUG
