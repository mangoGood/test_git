server:
  port: 8082

spring:
  application:
    name: sync-task-backend

  datasource:
    url: jdbc:mysql://192.168.107.2:3306/sync_task_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: rootpassword
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  security:
    user:
      name: admin
      password: admin

jwt:
  secret: synctask-secret-key-very-long-string-for-jwt-token-generation-and-validation-2024
  expiration: 86400000

logging:
  level:
    com.synctask: DEBUG
    org.springframework.security: DEBUG
